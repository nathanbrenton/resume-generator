  <title>Resume Generator</title>

<body>
  <main class="app-shell">
    <aside id="builderControls" class="builder-controls">
      <h1>Resume Generator</h1>
      <div class="control-group">
        <h2>Target Role</h2>
        <select id="targetRole"></select>
      </div>

      <div class="control-group">
        <h2>Customize</h2>
        <label class="customize-toggle">
          <input id="customizeToggle" type="checkbox">
          <span>Enable manual text editing</span>
        </label>
        <p class="customize-help">Edit text and lists directly in the resume preview. Changes are temporary and reset when a role or selection changes, or when the page reloads.</p>
      </div>

      <div class="control-group">
        <h2>Experience</h2>
        <div id="jobControls"></div>
      </div>

      <div class="control-group">
        <h2>Projects</h2>
        <div id="projectControls"></div>
      </div>

      <div class="control-group">
        <h2>Education</h2>
        <div id="educationControls"></div>
      </div>

      <div class="control-group">
        <h2>Certifications</h2>
        <div id="certificationControls"></div>
      </div>

      <div class="control-group">
        <button id="printButton" class="print-button" type="button">Print / Save PDF</button>
        <pre id="debugOutput" class="debug-output"></pre>
      </div>
    </aside>

    <section class="preview-wrap">
      <div id="resumePreview"></div>
    </section>
  </main>
