<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Resume Generator</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="app-shell">
    <aside id="builderControls" class="builder-controls">
      <h1>Resume Generator</h1>
      <p>Milestone 1: data validation, selection logic, skill de-duplication, and printable Letter preview.</p>

      <div class="control-group">
        <h2>Target Role</h2>
        <select id="targetRole"></select>
      </div>

      <div class="control-group">
        <h2>Experience</h2>
        <div id="jobControls"></div>
      </div>

      <div class="control-group">
        <h2>Projects</h2>
        <div id="projectControls"></div>
      </div>

      <div class="control-group">
        <h2>Education</h2>
        <div id="educationControls"></div>
      </div>

      <div class="control-group">
        <h2>Certifications</h2>
        <div id="certificationControls"></div>
      </div>

      <div class="control-group">
        <button id="printButton" class="print-button" type="button">Print / Save PDF</button>
        <pre id="debugOutput" class="debug-output"></pre>
      </div>
    </aside>

    <section class="preview-wrap">
      <div id="resumePreview"></div>
    </section>
  </main>

  <script src="./js/data/contact.js"></script>
